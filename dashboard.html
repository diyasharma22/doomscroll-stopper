<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doomscroll Stopper — Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <div class="header">
    <div class="header-left">
      <span class="logo">🛑</span>
      <div>
        <h1>Doomscroll Stopper</h1>
        <p>Your scrolling habits at a glance</p>
      </div>
    </div>
    <button id="reset-all-btn">🗑️ Reset All Data</button>
  </div>

  <div class="container">

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="today-total">0</div>
        <div class="stat-label">Mins today</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="week-total">0</div>
        <div class="stat-label">Mins this week</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="top-site">—</div>
        <div class="stat-label">Top site today</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="streak">0</div>
        <div class="stat-label">Day streak 🔥</div>
      </div>
    </div>

    <div class="section">
      <h2>Today's Breakdown</h2>
      <div id="today-breakdown">
        <p class="empty">No data yet for today 🎉</p>
      </div>
    </div>

    <div class="section">
      <h2>Last 7 Days</h2>
      <div id="weekly-chart">
        <p class="empty">No weekly data yet</p>
      </div>
    </div>

    <div class="section">
      <h2>Set Daily Limits (mins)</h2>
      <div id="limits-section"></div>
      <button id="save-limits-btn">💾 Save Limits</button>
    </div>

  </div>

  <script src="dashboard.js"></script>
</body>
</html>
